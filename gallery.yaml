# curIAtor — gallery config (the registry the shell + loop read).
# Add an entry per app; the curator edits each app's `source` when you give feedback on it.
# Full schema + rationale: docs/DESIGN.md.

apps:
  - name: aviato                 # the headline demo app — deliberately broken; the curator's first patient
    title: Aviato (revenue)
    mount: { kind: dash-inproc, module: aviato }   # dash-inproc = import & mount in-process; or kind: proxy {cmd, port}
    source: examples/dash/aviato.py                # what the curator edits
    tags: [demo, broken]
    color: "#e07b2a"

  - name: sales_overview
    title: Sales overview
    mount: { kind: dash-inproc, module: sales_overview }
    source: examples/dash/sales_overview.py
    tags: [demo, sales]
    color: "#1f6fc0"

  - name: cohort_explorer
    title: Cohort explorer
    mount: { kind: dash-inproc, module: cohort_explorer }
    source: examples/dash/cohort_explorer.py
    tags: [demo, analytics]
    color: "#177755"

# how the curator runs (see docs/DESIGN.md → "Agent adapter / deployment modes")
agent:
  adapter: headless-cc          # headless-cc (Claude sub, default) | codex (OpenAI Codex sub) | api | command
  autonomy: auto-small          # auto-small (fix small things) | propose-only (plan first)
  # provider knobs — all optional, sensible defaults shown:
  model: null                   # --model (null = the provider CLI default; e.g. sonnet/opus, or gpt-5-codex)
  permission_mode: acceptEdits  # acceptEdits (auto-apply edits) | bypassPermissions (zero prompts) | default
  allowed_tools: [Read, Edit, Write, Bash, Glob, Grep, WebSearch, WebFetch]   # headless-cc: pre-approved without a prompt
  #   headless `claude -p` can't prompt, so any tool the agent uses must be listed here. WebSearch/WebFetch
  #   enable read-only web research; drop WebFetch (or deny it) for UNTRUSTED public feedback — see SECURITY.md.
  # codex (`codex exec`) only — maps the same profile onto Codex flags:
  sandbox: workspace-write      # read-only | workspace-write (default) | danger-full-access
  #   (permission_mode: bypassPermissions ⇒ codex --dangerously-bypass-approvals-and-sandbox, full trust)
  timeout: 900                  # seconds before the one-shot agent is stopped (a "taking a while" heartbeat shows meanwhile)
  max_timeouts: 2               # after this many time-limit stops the item is parked (held), not retried forever
  cmd: "claude -p {task_file}"  # used only by adapter: command
  context:
    bundle: null                # required for adapter: api (cold start) — a CONTEXT.md/LESSONS.md
    knowledge_store: null       # optional live index (e.g. graphify) to keep the bundle fresh
  # Hosted dispatch controls. The watcher enforces these before setting feedback to `working`:
  # dispatch:
  #   anonymous: hold            # explicit anonymous feedback is always held, never auto-dispatched
  #   user: auto                 # logged-in accounts dispatch while inside quota
  #   trusted_groups: [trusted]  # bypass per-user quota, still bounded by global_daily
  # quotas:
  #   per_user_daily: 5          # account-tier runs per author per UTC day (omit = unlimited)
  #   global_daily: 100          # total collection agent runs per UTC day (omit = unlimited)
  # Elevated profile — feedback from these groups (the author's `groups`, from auth) runs with fuller
  # rights. INTENDED FOR THE SANDBOX/LOCAL CASE (one container per collection = the blast-radius boundary).
  # elevated:
  #   groups: [admin]                     # author in any of these → this profile is merged on top
  #   autonomy: auto                      # do substantive work directly (not just small tweaks)
  #   permission_mode: bypassPermissions  # no prompts — so it can `pip install`, edit requirements.txt, …
  #   allowed_tools: [Read, Edit, Write, Bash, Glob, Grep, WebSearch, WebFetch]
  #   disallowed_tools: ["Edit(.claude/**)", "Write(.claude/**)", "Bash(git push:*)", "Bash(rm -rf:*)"]  # the blacklist

# How ◆ General feedback on the RUNNER itself is handled. This repo IS the editable checkout, so the
# curator can patch curiator's own source ("curiator maintains curiator"). Consumers pin → drafts a PR.
runner:
  mode: checkout                # checkout (patch the runner locally, PR-able) | pinned (draft an upstream PR)
  path: .                       # the curiator checkout to edit (here: this repo root)

feedback:
  dir: feedback                 # SQLite ledger source of truth + shots/ live here
  screenshots: true

# Who gave each piece of feedback. curiator RESOLVES + RECORDS identity. Additive: omit this block
# (or mode: none) for today's anonymous single-tenant behavior.
auth:
  mode: none                    # none | local | header | oidc
  default_user: adam@local      # used by mode: none (provenance even solo)
  # local mode — a built-in username/password login (no IdP, no proxy): set `mode: local`, then
  #   `curiator user add <email>` to create accounts (hashed in a gitignored .curiator-users.json).
  #   Brute-force lockout (optional): max_attempts (default 5), lockout_seconds (default 300).
  # header mode — an edge proxy (oauth2-proxy / ingress) did the OIDC dance and sets trusted headers:
  # user_header:   X-Auth-Request-User
  # email_header:  X-Auth-Request-Email
  # groups_header: X-Auth-Request-Groups
  # oidc mode — curiator runs the flow directly (self-hosted, no proxy):
  # issuer: https://keycloak.example/realms/curiator
  # client_id: curiator
  # client_secret_env: CURIATOR_OIDC_SECRET   # secret via env, NEVER in this file

# Git as the memory (docs/DESIGN.md → "Git as the memory"). Every agent run → one atomic commit
# (source edit + ledger update together); the git log is the queryable, revertible record.
git:
  commit: false                 # false (default) = leave uncommitted | true = git-as-memory (per-run commits)
  branch: null                  # DEFAULT: commit to the current HEAD (main). Set a name (e.g. curiator/auto) only to
                                #   isolate curator work on its own branch — worth it per-app-repo, not for a shared monorepo.
  signoff: true                 # add Signed-off-by (DCO)
  include_ledger: false         # opt in to commit feedback/app_feedback.sqlite in the same commit
  # also_commit: dependency manifests an ELEVATED run may touch (pip install → requirements.txt) ride in
  # the SAME atomic commit, not left dangling. Defaults to the common manifests below; set [] to disable.
  # also_commit: [requirements.txt, pyproject.toml, package.json, poetry.lock, package-lock.json]
  # This repo (the runner's own checkout) keeps commit:false — a standalone collection runs commit:true.

shell:
  port: 8300        # 8200 is commonly taken; 8300 avoids the usual collisions
  # base_path: /gallery/example  # public URL prefix when mounted below a reverse-proxy origin
  # proxy_hops: 1                # trusted X-Forwarded-* proxy hops (0 for direct/local use)
  # secure_cookies: true         # use for HTTPS-hosted galleries

# tag → chip color (optional)
tags:
  demo: "#888"
  broken: "#e07b2a"
  sales: "#1f6fc0"
  analytics: "#177755"
