# CurIAtor — gallery config (the registry the shell + loop read).
# Add an entry per app; the curator edits each app's `source` when you give feedback on it.
# Full schema + rationale: docs/DESIGN.md.

apps:
  - name: aviato                 # the headline demo app — deliberately broken; the curator's first patient
    title: Aviato (revenue)
    mount: { kind: dash-inproc, module: aviato }   # dash-inproc = import & mount in-process; or kind: proxy {cmd, port}
    source: examples/dash/aviato.py                # what the curator edits
    tags: [demo, broken]
    color: "#e07b2a"

  - name: sales_overview
    title: Sales overview
    mount: { kind: dash-inproc, module: sales_overview }
    source: examples/dash/sales_overview.py
    tags: [demo, sales]
    color: "#1f6fc0"

  - name: cohort_explorer
    title: Cohort explorer
    mount: { kind: dash-inproc, module: cohort_explorer }
    source: examples/dash/cohort_explorer.py
    tags: [demo, analytics]
    color: "#177755"

# how the curator runs (see docs/DESIGN.md → "Agent adapter / deployment modes")
agent:
  adapter: headless-cc          # headless-cc (default, your Claude sub) | api (teams) | command (BYO)
  autonomy: auto-small          # auto-small (fix small things) | propose-only (plan first)
  # headless-cc (`claude -p`) knobs — all optional, sensible defaults shown:
  model: null                   # claude --model (null = your CLI default; e.g. sonnet, opus)
  permission_mode: acceptEdits  # acceptEdits (auto-apply edits) | bypassPermissions (zero prompts) | default
  allowed_tools: [Read, Edit, Write, Bash, Glob, Grep]   # pre-approved without a prompt (Bash runs the reply)
  timeout: 900                  # seconds before the one-shot agent is killed
  cmd: "claude -p {task_file}"  # used only by adapter: command
  context:
    bundle: null                # required for adapter: api (cold start) — a CONTEXT.md/LESSONS.md
    knowledge_store: null       # optional live index (e.g. graphify) to keep the bundle fresh

# How ◆ General feedback on the RUNNER itself is handled. This repo IS the editable checkout, so the
# curator can patch curiator's own source ("curiator maintains curiator"). Consumers pin → drafts a PR.
runner:
  mode: checkout                # checkout (patch the runner locally, PR-able) | pinned (draft an upstream PR)
  path: .                       # the curiator checkout to edit (here: this repo root)

feedback:
  dir: feedback                 # JSON ledger + shots/ live here
  screenshots: true

# Git as the memory (docs/DESIGN.md → "Git as the memory"). Every agent run → one atomic commit
# (source edit + ledger update together); the git log is the queryable, revertible record.
git:
  commit: false                 # false (default) = leave uncommitted | true = git-as-memory (per-run commits)
  branch: curiator/auto         # the sandbox/env branch commits land on (empty/null = current HEAD)
  signoff: true                 # add Signed-off-by (DCO)
  include_ledger: true          # commit feedback/app_feedback.json in the same commit
  # This repo (the runner's own checkout) keeps commit:false — a standalone collection runs commit:true.

shell:
  port: 8300        # 8200 is commonly taken; 8300 avoids the usual collisions

# tag → chip color (optional)
tags:
  demo: "#888"
  broken: "#e07b2a"
  sales: "#1f6fc0"
  analytics: "#177755"
