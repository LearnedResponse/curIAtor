name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"
      - name: Git identity (the gitmem tests commit in a tmp repo)
        run: |
          git config --global user.name "curiator CI"
          git config --global user.email "ci@curiator.test"
          git config --global init.defaultBranch main
      - name: Lint (ruff)
        run: ruff check curiator tests
      - name: Tests (pytest)
        run: pytest -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install -e ".[dev]"
      - name: Build sdist + wheel
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*

  dco:
    # The project accepts contributions under the DCO — every commit in a PR must be signed off.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: DCO sign-off check
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for c in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$c" | grep -qE "^Signed-off-by: .+ <.+@.+>"; then
              echo "::error::commit $(git log -1 --oneline "$c") is missing a DCO Signed-off-by line"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Sign your commits with 'git commit -s' (see CONTRIBUTING.md / the DCO)."
            exit 1
          fi
          echo "All PR commits carry a DCO sign-off."
