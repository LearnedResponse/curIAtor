name: release

# Tag a release: `git tag v0.2.0 && git push origin v0.2.0`. This builds the wheel + sdist,
# attaches them to a GitHub Release, then publishes to PyPI via trusted publishing.
# Pushing the tag is the human launch step — see CONTRIBUTING.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # create the GitHub Release + upload the build artifacts

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $version"
            exit 1
          fi
      - name: Release doc check
        run: python scripts/check_release_docs.py
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
      - name: Create GitHub Release + attach wheel/sdist
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write        # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
