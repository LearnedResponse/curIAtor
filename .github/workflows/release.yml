name: release

# Tag a release: `git tag v0.1.0 && git push origin v0.1.0`. This builds the wheel + sdist and
# attaches them to a GitHub Release. (Pushing the tag is the human launch step — see CONTRIBUTING.)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # create the GitHub Release + upload the build artifacts

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
      - name: Create GitHub Release + attach wheel/sdist
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────────────────────
